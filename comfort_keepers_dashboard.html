// ===== UTILITIES =====
function fmt(n) { return n.toLocaleString('en-US'); }
function fmtUSD(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function pct(n, d=2) { return n.toFixed(d) + '%'; }
function round2(n) { return Math.round(n * 100) / 100; }

function getFiltered() {
  const loc = document.getElementById('locationFilter').value;
  const type = document.getElementById('typeFilter').value;
  return campaigns.filter(c => {
    if (loc !== 'all' && c.location !== loc) return false;
    if (type !== 'all' && c.type !== type) return false;
    return true;
  });
}

function calcTotals(data) {
  const totalCost = data.reduce((s, c) => s + c.cost, 0);
  const totalImpr = data.reduce((s, c) => s + c.impressions, 0);
  const totalClicks = data.reduce((s, c) => s + c.clicks, 0);
  const totalInteractions = data.reduce((s, c) => s + c.interactions, 0);
  const totalConv = data.reduce((s, c) => s + c.conversions, 0);
  const avgCpc = totalClicks > 0 ? totalCost / totalClicks : 0;
  const ctr = totalImpr > 0 ? (totalInteractions / totalImpr) * 100 : 0;
  const convRate = totalClicks > 0 ? (totalConv / totalClicks) * 100 : 0;
  const costPerConv = totalConv > 0 ? totalCost / totalConv : 0;
  return { totalCost, totalImpr, totalClicks, totalInteractions, totalConv, avgCpc, ctr, convRate, costPerConv };
}

function getLocationData(data) {
  const map = {};
  data.forEach(c => {
    if (!map[c.location]) map[c.location] = { location: c.location, cost: 0, impressions: 0, clicks: 0, interactions: 0, conversions: 0, campaigns: 0 };
    map[c.location].cost += c.cost;
    map[c.location].impressions += c.impressions;
    map[c.location].clicks += c.clicks;
    map[c.location].interactions += c.interactions;
    map[c.location].conversions += c.conversions;
    map[c.location].campaigns += 1;
  });
  return Object.values(map).sort((a, b) => b.conversions - a.conversions);
}

function getTypeData(data) {
  const search = data.filter(c => c.type === 'Search');
  const pmax = data.filter(c => c.type === 'Performance Max');
  return { search: calcTotals(search), pmax: calcTotals(pmax), searchCount: search.length, pmaxCount: pmax.length };
}

let charts = [];
function destroyCharts() { charts.forEach(c => c.destroy()); charts = []; }

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  plugins: {
    legend: { labels: { color: 'rgba(232,240,254,0.55)', font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 16 } },
    tooltip: { backgroundColor: '#061428', borderColor: 'rgba(77,166,255,0.2)', borderWidth: 1, titleColor: '#e8f0fe', bodyColor: 'rgba(232,240,254,0.7)', padding: 10 }
  },
  scales: {
    x: { ticks: { color: 'rgba(232,240,254,0.38)', font: { family: 'Inter', size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
    y: { ticks: { color: 'rgba(232,240,254,0.38)', font: { family: 'Inter', size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
  }
};

function deepMerge(target, source) {
  const out = Object.assign({}, target);
  for (const k of Object.keys(source)) {
    if (source[k] && typeof source[k] === 'object' && !Array.isArray(source[k]) && target[k] && typeof target[k] === 'object' && !Array.isArray(target[k])) {
      out[k] = deepMerge(target[k], source[k]);
    } else { out[k] = source[k]; }
  }
  return out;
}

function createChart(id, config) {
  const ctx = document.getElementById(id);
  if (!ctx) return null;
  const base = config.type === 'doughnut' || config.type === 'pie'
    ? { responsive: true, maintainAspectRatio: false, plugins: CHART_DEFAULTS.plugins }
    : CHART_DEFAULTS;
  config.options = deepMerge(base, config.options || {});
  const ch = new Chart(ctx, config);
  charts.push(ch);
  return ch;
}

        <div class="grid-2" style="margin-bottom:1rem">
          <div class="kpi"><div class="kpi-label">Total Spend</div><div class="kpi-value highlight">${fmtUSD(typeData.search.totalCost)}</div></div>
          <div class="kpi"><div class="kpi-label">Conversions</div><div class="kpi-value green">${typeData.search.totalConv.toFixed(2)}</div></div>
          <div class="kpi"><div class="kpi-label">Avg CTR</div><div class="kpi-value">${pct(typeData.search.ctr)}</div></div>
          <div class="kpi"><div class="kpi-label">Cost / Conv.</div><div class="kpi-value">${fmtUSD(typeData.search.costPerConv)}</div></div>
          <div class="kpi"><div class="kpi-label">Avg CPC</div><div class="kpi-value">${fmtUSD(typeData.search.avgCpc)}</div></div>
          <div class="kpi"><div class="kpi-label">Conv. Rate</div><div class="kpi-value">${pct(typeData.search.convRate)}</div></div>
        </div>
        <div class="card-title">Top Search Campaigns</div>
        <div class="overflow-x">
          <table>
            <thead><tr><th>Campaign</th><th class="right">Spend</th><th class="right">Conv.</th><th class="right">CPA</th></tr></thead>
            <tbody>
              ${[...searchCamps].sort((a,b) => b.conversions-a.conversions).slice(0,6).map(c => `
                <tr>
                  <td style="font-size:0.72rem;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</td>
                  <td class="right">${fmtUSD(c.cost)}</td>
                  <td class="right" style="color:#34d399;font-weight:700">${c.conversions.toFixed(2)}</td>
                  <td class="right">${c.conversions > 0 ? fmtUSD(c.costPerConv) : '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card" style="border-color:rgba(167,139,250,0.15)">
        <div class="card-title" style="color:#a78bfa">Performance Max Campaigns — ${pmaxCamps.length} campaigns</div>
        <div class="grid-2" style="margin-bottom:1rem">
          <div class="kpi"><div class="kpi-label">Total Spend</div><div class="kpi-value" style="color:#a78bfa">${fmtUSD(typeData.pmax.totalCost)}</div></div>
          <div class="kpi"><div class="kpi-label">Conversions</div><div class="kpi-value green">${typeData.pmax.totalConv.toFixed(2)}</div></div>
          <div class="kpi"><div class="kpi-label">Avg CTR</div><div class="kpi-value">${pct(typeData.pmax.ctr)}</div></div>
          <div class="kpi"><div class="kpi-label">Cost / Conv.</div><div class="kpi-value">${fmtUSD(typeData.pmax.costPerConv)}</div></div>
          <div class="kpi"><div class="kpi-label">Avg CPC</div><div class="kpi-value">${fmtUSD(typeData.pmax.avgCpc)}</div></div>
          <div class="kpi"><div class="kpi-label">Conv. Rate</div><div class="kpi-value">${pct(typeData.pmax.convRate)}</div></div>
        </div>
        <div class="card-title">Top PMax Campaigns</div>
        <div class="overflow-x">
          <table>
            <thead><tr><th>Campaign</th><th class="right">Spend</th><th class="right">Conv.</th><th class="right">CPA</th></tr></thead>
            <tbody>
              ${[...pmaxCamps].sort((a,b) => b.conversions-a.conversions).slice(0,6).map(c => `
                <tr>
                  <td style="font-size:0.72rem;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</td>
                  <td class="right">${fmtUSD(c.cost)}</td>
                  <td class="right" style="color:#34d399;font-weight:700">${c.conversions.toFixed(2)}</td>
                  <td class="right">${c.conversions > 0 ? fmtUSD(c.costPerConv) : '—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="compare-panel">
      <div class="compare-title">Head-to-Head: Search vs. Performance Max</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:0.5rem;align-items:center;font-size:0.78rem;margin-bottom:0.5rem">
        <span style="color:#4da6ff;font-weight:700;font-size:0.72rem">SEARCH</span>
        <span></span>
        <span style="color:#a78bfa;font-weight:700;font-size:0.72rem;text-align:right">PERFORMANCE MAX</span>
      </div>
      ${[
        ['Total Spend', fmtUSD(typeData.search.totalCost), fmtUSD(typeData.pmax.totalCost), 'low-abs'],
        ['Impressions', fmt(typeData.search.totalImpr), fmt(typeData.pmax.totalImpr), 'high'],
        ['Clicks', fmt(typeData.search.totalClicks), fmt(typeData.pmax.totalClicks), 'high'],
        ['CTR', pct(typeData.search.ctr), pct(typeData.pmax.ctr), 'high'],
        ['Conversions', typeData.search.totalConv.toFixed(2), typeData.pmax.totalConv.toFixed(2), 'high'],
        ['Conv. Rate', pct(typeData.search.convRate), pct(typeData.pmax.convRate), 'high'],
        ['Avg CPC', fmtUSD(typeData.search.avgCpc), fmtUSD(typeData.pmax.avgCpc), 'low'],
        ['Cost / Conv.', fmtUSD(typeData.search.costPerConv), fmtUSD(typeData.pmax.costPerConv), 'low'],
      ].map(([label, sv, pv]) => `
        <div style="display:grid;grid-template-columns:1fr 140px 1fr;gap:0.5rem;align-items:center;padding:0.4rem 0;border-bottom:1px solid rgba(255,255,255,0.05)">
          <span style="font-weight:700;color:#e8f0fe">${sv}</span>
          <span style="text-align:center;color:rgba(232,240,254,0.38);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em">${label}</span>
          <span style="font-weight:700;color:#e8f0fe;text-align:right">${pv}</span>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <div class="card-title">Spend vs. Conversions by Campaign Type &amp; Location</div>
      <div class="chart-container" style="height:300px">
        <canvas id="chart-type-loc-combo"></canvas>
      </div>
    </div>
  </div>`;

  // Combo chart per location
  const locs = [...new Set(data.map(c => c.location))];
  const searchByLoc = locs.map(l => {
    const camps = data.filter(c => c.location === l && c.type === 'Search');
    return round2(camps.reduce((s,c) => s+c.cost, 0));
  });
  const pmaxByLoc = locs.map(l => {
    const camps = data.filter(c => c.location === l && c.type === 'Performance Max');
    return round2(camps.reduce((s,c) => s+c.cost, 0));
  });

  createChart('chart-type-loc-combo', {
    type: 'bar',
    data: {
      labels: locs,
      datasets: [
        { label: 'Search Spend', data: searchByLoc, backgroundColor: 'rgba(77,166,255,0.7)', borderColor: '#4da6ff', borderWidth: 1, borderRadius: 3 },
        { label: 'PMax Spend', data: pmaxByLoc, backgroundColor: 'rgba(167,139,250,0.7)', borderColor: '#a78bfa', borderWidth: 1, borderRadius: 3 },
      ]
    },
    options: { scales: { x: { stacked: false }, y: { stacked: false, ticks: { callback: v => '$'+v } } } }
  });
}

// ===== RENDER ALL =====
function renderAll() {
  destroyCharts();
  renderTabs();
  const data = getFiltered();
  const totals = calcTotals(data);
  const locData = getLocationData(data);
  const typeData = getTypeData(data);

  // clear all tabs
  ['overview','campaigns','locations','types'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el && activeTab !== t) el.innerHTML = '';
  });

  if (activeTab === 'overview')  renderOverview(data, totals, locData, typeData);
  if (activeTab === 'campaigns') renderCampaigns(data);
  if (activeTab === 'locations') renderLocations(data, locData);
  if (activeTab === 'types')     renderTypes(data, typeData);
}

// ===== INIT =====
renderAll();
</script>
</body>
</html>
