// ===== UTILITIES =====
function fmt(n) { return n.toLocaleString('en-IN'); }
function fmtCurrency(n) { return '\u20B9' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function pct(n) { return n.toFixed(1) + '%'; }
function shortDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-IN', { month: 'short', day: 'numeric' });
}

function getFiltered() {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  return dailyData.filter(d => d.date >= start && d.date <= end);
}

function calcTotals(filtered) {
  const totalSpend = filtered.reduce((s, d) => s + d.pmax.s + d.search.s + d.youtube.s + d.retargeting.s, 0);
  const totalClicks = filtered.reduce((s, d) => s + d.pmax.c + d.search.c + d.youtube.c + d.retargeting.c, 0);
  const totalImpressions = filtered.reduce((s, d) => s + d.pmax.i + d.search.i + d.youtube.i + d.retargeting.i, 0);
  const totalConversions = filtered.reduce((s, d) => s + d.pmax.conv + d.search.conv + d.youtube.conv + d.retargeting.conv, 0);
  const totalSignups = filtered.reduce((s, d) => s + d.ga4.signups, 0);
  const totalChatMsgs = filtered.reduce((s, d) => s + d.ga4.chat, 0);
  const totalFirstMsgs = filtered.reduce((s, d) => s + d.ga4.first, 0);
  const totalPaidSignups = filtered.reduce((s, d) => s + d.paid.signups, 0);
  const totalPaidChatMsgs = filtered.reduce((s, d) => s + d.paid.chat, 0);
  const totalPaidFirstMsgs = filtered.reduce((s, d) => s + d.paid.first, 0);
  const spendWithGST = totalSpend * (1 + GST_RATE);
  const cplWithoutGST = totalConversions > 0 ? totalSpend / totalConversions : 0;
  const cplWithGST = totalConversions > 0 ? spendWithGST / totalConversions : 0;
  const ctr = totalImpressions > 0 ? (totalClicks / totalImpressions) * 100 : 0;
  const activationRate = totalSignups > 0 ? (totalFirstMsgs / totalSignups) * 100 : 0;
  const paidActivationRate = totalPaidSignups > 0 ? (totalPaidFirstMsgs / totalPaidSignups) * 100 : 0;
  return { totalSpend, spendWithGST, totalClicks, totalImpressions, totalConversions, totalSignups, totalChatMsgs, totalFirstMsgs, totalPaidSignups, totalPaidChatMsgs, totalPaidFirstMsgs, cplWithoutGST, cplWithGST, ctr, activationRate, paidActivationRate };
}

function sumCampaign(filtered, key) {
  return {
    clicks: filtered.reduce((s, d) => s + d[key].c, 0),
    impressions: filtered.reduce((s, d) => s + d[key].i, 0),
    conversions: filtered.reduce((s, d) => s + d[key].conv, 0),
    spend: filtered.reduce((s, d) => s + d[key].s, 0),
  };
}

function campaignTotals(filtered) {
  return { pmax: sumCampaign(filtered, 'pmax'), search: sumCampaign(filtered, 'search'), youtube: sumCampaign(filtered, 'youtube'), retargeting: sumCampaign(filtered, 'retargeting') };
}

// ===== STATE =====
let activeTab = 'overview';

let charts = [];

function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function createChart(canvasId, config) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  const defaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: 'rgba(245,240,235,0.6)', font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 16 } },
    },
    scales: {}
  };
  if (config.type !== 'doughnut' && config.type !== 'pie') {
    defaults.scales = {
      x: { ticks: { color: 'rgba(245,240,235,0.4)', font: { family: 'Inter', size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
      y: { ticks: { color: 'rgba(245,240,235,0.4)', font: { family: 'Inter', size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
    };
  }
  const merged = deepMerge(defaults, config.options || {});
  config.options = merged;
  const chart = new Chart(ctx, config);
  charts.push(chart);
  return chart;
}

function deepMerge(target, source) {
  const output = Object.assign({}, target);
  for (const key of Object.keys(source)) {
    if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key] && typeof target[key] === 'object' && !Array.isArray(target[key])) {
      output[key] = deepMerge(target[key], source[key]);
    } else {
      output[key] = source[key];
    }
  }
  return output;
}

function gstCampCard(label, camp, color) {
  const val = camp.conversions > 0 ? (camp.spend * 1.18) / camp.conversions : 0;

  </div>`;
}

function kpi(label, value, sub, highlight, trend) {
  let subHtml = '';
  if (sub) {
    let arrow = '';
    if (trend === 'up') arrow = '<span class="up">\u25B2</span>';
    if (trend === 'down') arrow = '<span class="down">\u25BC</span>';
    subHtml = `<div class="kpi-sub">${arrow}${sub}</div>`;
  }
  return `<div class="kpi">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value ${highlight ? 'highlight' : ''}">${value}</div>
    ${subHtml}
  </div>`;
}

            <div style="display:flex;flex-direction:column;gap:0.75rem;font-size:0.8rem">
              <div class="camp-row"><span class="label">Clicks</span><span class="val">${fmt(c.data.clicks)}</span></div>
              <div class="camp-row"><span class="label">Impressions</span><span class="val">${fmt(c.data.impressions)}</span></div>
              <div class="camp-row"><span class="label">CTR</span><span class="val">${pct(ctr)}</span></div>
              <div class="camp-row"><span class="label">Conversions</span><span class="val" style="color:#34d399">${fmt(Math.round(c.data.conversions))}</span></div>
              <div class="camp-row"><span class="label">Spend</span><span class="val">${fmtCurrency(c.data.spend)}</span></div>
              <div class="camp-row"><span class="label">Spend (w/ GST)</span><span class="val" style="color:#f87171">${fmtCurrency(c.data.spend * 1.18)}</span></div>
              <div class="camp-separator" style="border-color:${c.color}30">
                <div class="camp-row"><span class="label">CPL (excl. GST)</span><span class="val">${fmtCurrency(cpl)}</span></div>
                <div class="camp-row" style="margin-top:0.25rem"><span style="color:#ffae00">CPL (incl. 18% GST)</span><span style="font-weight:800;color:#ffae00">${fmtCurrency(cplGst)}</span></div>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">Daily Clicks by Campaign</div>
          <div class="chart-container" style="height:300px"><canvas id="chartClicksByDay"></canvas></div>
        </div>
        <div class="card">
          <div class="card-title">Campaign Conversion Share</div>
          <div class="chart-container" style="height:250px"><canvas id="chartConvShare"></canvas></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">CPL Comparison &mdash; With and Without GST</div>
        <div class="overflow-x">
          <table>
            <thead><tr>
              <th>Campaign</th><th class="right">Spend</th><th class="right">GST (18%)</th><th class="right">Total Cost</th><th class="right">Conversions</th><th class="right">CPL (excl. GST)</th><th class="right" style="color:#ffae00;font-weight:700">CPL (incl. GST)</th>
            </tr></thead>
            <tbody>
              ${campData.map(c => {
                const gst = c.data.spend * GST_RATE;
                const total = c.data.spend + gst;
                const cpl = c.data.conversions > 0 ? c.data.spend / c.data.conversions : 0;
                const cplGst = c.data.conversions > 0 ? total / c.data.conversions : 0;
                return `<tr>
                  <td style="font-weight:700;color:${c.color}">${c.name}</td>
                  <td class="right">${fmtCurrency(c.data.spend)}</td>
                  <td class="right" style="color:#f87171">${fmtCurrency(gst)}</td>
                  <td class="right" style="font-weight:600">${fmtCurrency(total)}</td>
                  <td class="right" style="color:#34d399">${fmt(Math.round(c.data.conversions))}</td>
                  <td class="right">${fmtCurrency(cpl)}</td>
                  <td class="right" style="font-weight:700;color:#ffae00">${fmtCurrency(cplGst)}</td>
                </tr>`;
              }).join('')}
              <tr style="border-top:2px solid rgba(255,174,0,0.2)">
                <td style="font-weight:700;color:#ffae00">TOTAL</td>
                <td class="right" style="font-weight:700">${fmtCurrency(totalSpend)}</td>
                <td class="right" style="font-weight:700;color:#f87171">${fmtCurrency(totalSpend * GST_RATE)}</td>
                <td class="right" style="font-weight:700">${fmtCurrency(totalSpend * 1.18)}</td>
                <td class="right" style="font-weight:700;color:#34d399">${fmt(Math.round(totalConv))}</td>
                <td class="right" style="font-weight:700">${fmtCurrency(totalCplExcl)}</td>
                <td class="right" style="font-weight:800;color:#ffae00">${fmtCurrency(totalCplIncl)}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  createChart('chartClicksByDay', {
    type: 'bar',
    data: {
      labels: dateLabels,
      datasets: [
        { label: 'PMax', data: filtered.map(d => d.pmax.c), backgroundColor: 'rgba(96,165,250,0.7)', borderRadius: 4 },
        { label: 'Search', data: filtered.map(d => d.search.c), backgroundColor: 'rgba(255,174,0,0.7)', borderRadius: 4 },
        { label: 'YouTube', data: filtered.map(d => d.youtube.c), backgroundColor: 'rgba(248,113,113,0.7)', borderRadius: 4 },
        { label: 'Retargeting', data: filtered.map(d => d.retargeting.c), backgroundColor: 'rgba(167,139,250,0.7)', borderRadius: 4 },
      ],
    },
    options: { scales: { x: { stacked: true, grid: { display: false } }, y: { stacked: true } } }
  });

  createChart('chartConvShare', {
    type: 'doughnut',
    data: {
      labels: ['PMax', 'Search', 'YouTube', 'Retargeting'],
      datasets: [{
        data: [Math.round(camps.pmax.conversions), Math.round(camps.search.conversions), Math.round(camps.youtube.conversions), Math.round(camps.retargeting.conversions)],
        backgroundColor: ['#60a5fa', '#ffae00', '#ef4444', '#a78bfa'],
        borderWidth: 0,
      }],
    },
    options: { cutout: '60%' },
  });
}

// ===== KEYWORDS TAB =====
function renderKeywords() {
  const top12 = keywords.slice(0, 12);
  const el = document.getElementById('tab-keywords');
  el.innerHTML = `
    <div class="space-y">
      <div class="card">
        <div class="card-title">Top Keywords by Conversions (Mar 3-15)</div>
        <div class="chart-container" style="height:400px"><canvas id="chartKeywords"></canvas></div>
      </div>

      <div class="card">
        <div class="card-title">Keyword Performance Table</div>
        <div class="overflow-x">
          <table>
            <thead><tr>
              <th>#</th><th>Keyword</th><th class="right">Impr</th><th class="right">Clicks</th><th class="right">Conv</th><th class="right">CPA</th><th class="right" style="color:#ffae00;font-weight:700">CPA (w/ GST)</th><th class="right">CTR</th><th class="right">Conv Rate</th>
            </tr></thead>
            <tbody>
              ${keywords.map((k, i) => {
                const cpa = k.conversions > 0 ? k.spend / k.conversions : 0;
                const cpaGst = cpa * 1.18;
                const cpaColor = cpaGst < 20 ? '#34d399' : cpaGst < 40 ? '#ffae00' : '#f87171';
                const crColor = k.convRate >= 50 ? '#34d399' : '#f5f0eb';
                return `<tr>
                  <td style="color:rgba(245,240,235,0.4)">${i + 1}</td>
                  <td style="font-weight:500">${k.keyword}</td>
                  <td class="right">${fmt(k.impressions)}</td>
                  <td class="right">${fmt(k.clicks)}</td>
                  <td class="right" style="font-weight:700;color:#34d399">${fmt(k.conversions)}</td>
                  <td class="right">${fmtCurrency(cpa)}</td>
                  <td class="right" style="font-weight:700;color:${cpaColor}">${fmtCurrency(cpaGst)}</td>
                  <td class="right">${pct(k.ctr)}</td>
                  <td class="right" style="color:${crColor}">${pct(k.convRate)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div class="note">* Conv rates above 100% are due to Google Ads Data-Driven Attribution (DDA). CPL with GST = (Spend \u00D7 1.18) / Conversions.</div>
      </div>
    </div>
  `;

  createChart('chartKeywords', {
    type: 'bar',
    data: {
      labels: top12.map(k => k.keyword),
      datasets: [{
        label: 'Conversions',
        data: top12.map(k => k.conversions),
        backgroundColor: top12.map((_, i) => i === 0 ? '#ffae00' : 'rgba(96,165,250,0.6)'),
        borderRadius: 6,
      }],
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true }, y: { ticks: { font: { size: 11 }, padding: 4 } } },
    },
  });
}

// ===== CITIES TAB =====
function renderCities() {
  const cityColors = ['#ffae00', '#f5a623', '#eb9e46', '#e09669', '#d68e8c', '#cc86af', '#c27ed2', '#b876f5', '#ae6ef5', '#a466f5', '#9a5ef5', '#9056f5'];

  const el = document.getElementById('tab-cities');
  el.innerHTML = `
    <div class="space-y">
      <div class="card">
        <div class="card-title">Top Cities by Conversions</div>
        <div class="chart-container" style="height:350px"><canvas id="chartCities"></canvas></div>
      </div>

      <div class="card">
        <div class="card-title">City Performance Detail</div>
        <div class="overflow-x">
          <table>
            <thead><tr>
              <th>City</th><th class="right">Impressions</th><th class="right">Clicks</th><th class="right">Conversions</th><th class="right">Spend</th><th class="right">CPL</th><th class="right" style="color:#ffae00;font-weight:700">CPL (w/ GST)</th><th class="right">Conv Rate</th>
            </tr></thead>
            <tbody>
              ${cities.map(c => {
                const cpl = c.conversions > 0 ? c.spend / c.conversions : 0;
                const cplGst = cpl * 1.18;
                const cvr = c.clicks > 0 ? (c.conversions / c.clicks) * 100 : 0;
                const cplColor = cplGst < 15 ? '#34d399' : cplGst < 25 ? '#ffae00' : '#f87171';
                return `<tr>
                  <td style="font-weight:700">${c.city}</td>
                  <td class="right">${fmt(c.impressions)}</td>
                  <td class="right">${fmt(c.clicks)}</td>
                  <td class="right" style="font-weight:700;color:#34d399">${fmt(c.conversions)}</td>
                  <td class="right">${fmtCurrency(c.spend)}</td>
                  <td class="right">${fmtCurrency(cpl)}</td>
                  <td class="right" style="font-weight:700;color:${cplColor}">${fmtCurrency(cplGst)}</td>
                  <td class="right">${pct(cvr)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  createChart('chartCities', {
    type: 'bar',
    data: {
      labels: cities.map(c => c.city),
      datasets: [{
        label: 'Conversions',
        data: cities.map(c => c.conversions),
        backgroundColor: cities.map((_, i) => cityColors[i] || '#9056f5'),
        borderRadius: 6,
      }],
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { beginAtZero: true }, y: { ticks: { font: { size: 11 } } } },
    },
  });
}

// ===== INIT =====
document.getElementById('startDate').addEventListener('change', renderAll);
document.getElementById('endDate').addEventListener('change', renderAll);
renderAll();
</script>
</body>
</html>
